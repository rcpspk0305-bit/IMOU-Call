name: Streamlit 24-7 Keep Awake Daemon
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  ping_app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create empty heartbeat commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "infra: 24/7 autonomous keep-awake heartbeat"
          git push origin main
